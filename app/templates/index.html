<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fruit Freshness Detector — upload a fruit image to classify it as Fresh or Rotten using deep learning." />
  <title>Fruit Freshness Detector</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="card">
    <h1>🍎 Fruit Freshness Detector</h1>
    <p class="subtitle">Upload a fruit image to classify it as <strong>Fresh</strong> or <strong>Rotten</strong>.</p>

    <!-- Upload form -->
    <form id="upload-form" enctype="multipart/form-data">
      <label class="file-label" for="image-input">
        <span id="file-label-text">Choose an image…</span>
        <input type="file" id="image-input" name="image" accept="image/*" required />
      </label>

      <!-- Image preview -->
      <div id="preview-container" class="hidden">
        <img id="preview-img" src="#" alt="Image preview" />
      </div>

      <button type="submit" id="submit-btn">Analyse</button>
    </form>

    <!-- Result area -->
    <div id="result-box" class="hidden">
      <div class="results-grid">
        <!-- CNN Model Column -->
        <div class="result-column">
          <h3>CNN</h3>
          <div id="cnn-label" class="model-label"></div>
          <div id="cnn-confidence" class="model-conf"></div>
          <div class="model-bar-container">
            <div id="cnn-bar" class="model-bar"></div>
          </div>
        </div>

        <!-- Transfer Model Column -->
        <div class="result-column">
          <h3>Transfer Learning</h3>
          <div id="transfer-label" class="model-label"></div>
          <div id="transfer-confidence" class="model-conf"></div>
          <div class="model-bar-container">
            <div id="transfer-bar" class="model-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading spinner -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Analysing with both models…</p>
    </div>

    <!-- Error message -->
    <div id="error-box" class="hidden">
      <p id="error-text"></p>
    </div>
  </div>

  <script>
    const form         = document.getElementById('upload-form');
    const fileInput    = document.getElementById('image-input');
    const fileLabelTxt = document.getElementById('file-label-text');
    const previewCont  = document.getElementById('preview-container');
    const previewImg   = document.getElementById('preview-img');
    const submitBtn    = document.getElementById('submit-btn');
    const resultBox    = document.getElementById('result-box');
    const loading      = document.getElementById('loading');
    const errorBox     = document.getElementById('error-box');
    const errorText    = document.getElementById('error-text');

    // Model elements
    const cLabel = document.getElementById('cnn-label');
    const cConf  = document.getElementById('cnn-confidence');
    const cBar   = document.getElementById('cnn-bar');

    const tLabel = document.getElementById('transfer-label');
    const tConf  = document.getElementById('transfer-confidence');
    const tBar   = document.getElementById('transfer-bar');

    // Show preview when a file is chosen
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileLabelTxt.textContent = file.name;
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        previewCont.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
      // Reset previous results
      resultBox.classList.add('hidden');
      errorBox.classList.add('hidden');
    });

    // Submit via fetch — no page reload
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const file = fileInput.files[0];
      if (!file) return;

      // Show spinner, hide results
      loading.classList.remove('hidden');
      resultBox.classList.add('hidden');
      errorBox.classList.add('hidden');
      submitBtn.disabled = true;

      const formData = new FormData();
      formData.append('image', file);

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();
        console.log("Prediction result:", data);

        if (!response.ok || data.error) {
          throw new Error(data.error || 'Server error');
        }

        // Helper to update a model column
        const updateModel = (modelData, labelEl, confEl, barEl) => {
          if (!modelData || !labelEl) return;
          const isFresh = modelData.label === 'Fresh';
          const emoji   = isFresh ? '✅' : '❌';
          const color   = isFresh ? 'fresh' : 'rotten';

          labelEl.textContent = `${emoji} ${modelData.label}`;
          labelEl.className   = `model-label ${color}`;
          confEl.textContent  = `Confidence: ${modelData.confidence.toFixed(1)}%`;
          barEl.style.width   = `${modelData.confidence}%`;
          barEl.className     = `model-bar ${color}`;
        };

        // Update both columns
        // We check for both 'CNN' (new) and 'scratch' (fallback) just in case
        const cnnData = data.CNN || data.scratch;
        updateModel(cnnData, cLabel, cConf, cBar);
        updateModel(data.transfer, tLabel, tConf, tBar);

        resultBox.classList.remove('hidden');
      } catch (err) {
        errorText.textContent = `Error: ${err.message}`;
        errorBox.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
